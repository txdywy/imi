name: Fetch & Deploy

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:       # Manual trigger
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts

      - name: Fetch news
        run: node scripts/fetch-news.mjs

      - name: Commit data
        run: |
          git config user.name "IMI Bot"
          git config user.email "bot@imi.dev"
          git add data/news.json
          if ! git diff --staged --quiet; then
            git pull --rebase origin main
            git commit -m "chore: update news data $(date -u '+%Y-%m-%d %H:%M')"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy
          cp -r index.html css js data _deploy/
          # Exclude non-deployable files

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_deploy'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
